<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Hussien</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1>Ali Hussein</h1>
            <h5>AI research + General Chaos</h5>
        </div>
        <div id="main-area">
            <div id="sidebar">
                <button id="toggle-sidebar" type="button" aria-expanded="true" aria-controls="sidebar-body">x</button>
                <div id="sidebar-body">
                    <div id="game-map" aria-live="polite"></div>
                    <p id="sidebar-hint">Use arrow keys to move. Tap room letters to jump straight to content.</p>
                    <div id="touch-controls" aria-label="Touch controls">
                        <div class="touch-grid">
                            <span></span>
                            <button type="button" data-move="up">UP</button>
                            <span></span>
                            <button type="button" data-move="left">LEFT</button>
                            <button type="button" data-action="interact">ACT</button>
                            <button type="button" data-move="right">RIGHT</button>
                            <span></span>
                            <button type="button" data-move="down">DOWN</button>
                            <button type="button" data-action="inventory">INV</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="content"></div>
        </div>
        <div id="status-bar">
            <div id="health"></div>
            <div id="xp"></div>
            <div id="level"></div>
            <div id="keys"></div>
        </div>
    </div>
    <div id="inventory" class="hidden"></div>
    <div id="dialog" class="hidden"></div>
    <div id="toast-region" aria-live="polite"></div>

    <script src="scripts/config.js"></script>
    <script src="scripts/entities.js"></script>
    <script src="scripts/player.js"></script>
    <script src="scripts/map.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/game.js"></script>
</body>
</html>
